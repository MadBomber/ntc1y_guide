title: "A Year at His Feet"
tagline: "A Chronological Journey Through the New Testament"
author: "Dewayne VanHoozer"
email: dewayne@vanhoozer.com
description: >-
  A 52-week chronological journey through all 260 chapters of the New Testament.
  Read the story as it unfolded — Gospels harmonized by event, Paul's letters
  placed when he wrote them, and Revelation as the grand finale.
